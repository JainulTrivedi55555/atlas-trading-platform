name: Deploy ATLAS to GCP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/atlas-trading-platform
            git pull origin main
            source ~/miniconda3/etc/profile.d/conda.sh
            conda activate fintech
            pip install -r requirements.txt --quiet 2>/dev/null || true
            sudo systemctl restart atlas-api.service
            sudo systemctl restart atlas-streamlit.service
            sleep 5
            sudo systemctl is-active atlas-api.service
            sudo systemctl is-active atlas-streamlit.service
            echo "ATLAS deployment complete"
